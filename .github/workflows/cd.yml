name: Deploy to NPM
on:
  push:
    tags:
      - v*.*.*

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Pull code
        uses: actions/checkout@v7

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 9

      - name: Setup Node for NPM publish
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Ensure npm is updated
        # Publishing with npm 12 is currently broken - see https://github.com/npm/cli/issues/9722
        # Lock to 11.x for now until this is resolved
        run: npm install -g npm@11

      - name: Install Node dependencies
        run: pnpm i --frozen-lockfile

      - name: Run tests
        run: pnpm test

      - name: Publish to NPM
        run: pnpm publish --no-git-checks --access public
